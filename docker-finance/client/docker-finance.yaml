#
# `docker-finance` manifest
#

# Release version (tag format)
version: "v1.3.0"

# Container dependencies (used by `version` command)
# NOTE: this must stay inline with Dockerfiles
container:
  archlinux:
    finance:
      system:
        packages:
          - "coreutils"
          - "bash"
          - "gawk"
          - "sed"
        commands:
      base:
        packages:
          - "bc"
          - "csvkit"
          - "less"
          - "vim"
          - "xan"
          - "yq"
        commands:
          - "hledger --version"
          - "hledger-flow --version"
          - "hledger-iadd --version"
          - "hledger-ui --version"
          - "hledger-web --version"
      fetch:
        packages:
          - "composer"
          - "proxychains-ng"
        commands:
          - "php --version | head -n1"
          - "cat /usr/local/lib/php/composer.json"
      root:
        packages:
          - "benchmark"
          - "botan"
          - "crypto++"
          - "gtest"
          - "libsodium"
          - "root"
        commands:
      track:
        packages:
          - "git"
          - "timew"
          - "visidata"
        commands:
  ubuntu:
    finance:
      system:
        packages:
          - "coreutils"
          - "bash"
          - "sed"
        commands:
      base:
        packages:
          - "bc"
          - "cargo"
          - "csvkit"
          - "gawk"
          - "vim"
          - "yq"
          - "zlib1g-dev"
        commands:
          - "hledger --version"
          - "hledger-flow --version"
          - "hledger-flow --version"
          - "hledger-iadd --version"
          - "hledger-ui --version"
          - "hledger-web --version"
          - "xan --version"
      fetch:
        packages:
          - "composer"
          - "curl"
          - "proxychains4"
        commands:
          - "php --version | head -n1"
          - "cat /usr/local/lib/php/composer.json"
      root:
        packages:
          - "googletest"
          - "libbenchmark-dev"
          - "libbotan-2-dev"
          - "libcrypto++-dev"
          - "libsodium-dev"
        commands:
          - "root --version"
      track:
        packages:
          - "git"
          - "timewarrior"
          - "visidata"
        commands:
    dev-tools:
      system:
        packages:
          - "coreutils"
          - "bash"
        commands:
      base:
        packages:
          - "composer"
          - "yq"
        commands:
      linters:
        packages:
          # Bash
          - "shfmt"
          - "shellcheck"
          # C++
          - "clang-format"
          - "cppcheck"
          - "cpplint"
        commands:
          # PHP
          - "php-cs-fixer --version --no-ansi"
          - "phpstan --version --no-ansi"
      fetch:
        packages:
        commands:
          - "php --version | head -n1"
          - "cat /usr/local/lib/php/composer.json"
      misc:
        packages:
          - "doxygen"
          - "graphviz"
        commands:

